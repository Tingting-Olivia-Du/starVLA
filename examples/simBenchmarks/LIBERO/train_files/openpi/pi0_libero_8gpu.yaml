run_id: openpi_pi0_libero_8gpu
run_root_dir: outputs/starvla
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starvla_pi
is_debug: false

framework:
  name: PI0
  precision: bfloat16
  action_dim: 32
  action_horizon: 50
  max_state_dim: 32
  discrete_state_input: false
  max_token_len: 48
  num_inference_steps: 10
  tokenizer:
    model_path: paligemma_tokenizer.model
    pad_state_value: -2.0
  paligemma:
    model_name_or_path: ""

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: true
    data_root_dir: data/starvla_lerobot_root/libero
    data_mix: openpi_libero_all
    action_type: delta_qpos
    action_mode: delta
    per_device_batch_size: 4
    num_workers: 4
    prefetch_factor: 2
    persistent_workers: true
    pin_memory: true
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  pretrained_checkpoint: openpi_converted_protocol/pi0_base_starvla/fp32/model.safetensors
  is_resume: false
  max_train_steps: 30000
  num_warmup_steps: 1000
  save_interval: 1000
  eval_interval: 100000000
  learning_rate:
    base: 2.5e-05
    action_head: 2.5e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 2.5e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  weight_decay: 1.0e-10
  logging_frequency: 100
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-10
  save_format: pt
