run_id: starvla_qwenoft_g1_sonic_smoke
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_unitree_g1_wholebody
is_debug: false
version_id: "0.21"

framework:
  name: QwenOFT
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3.5-0.8B
    attn_implementation: sdpa
  action_model:
    action_model_type: MLP
    action_dim: 78
    state_dim: 72
    action_horizon: 8

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: true
    data_root_dir: playground/Datasets/UnitreeG1_WholeBody/lerobot
    data_mix: unitree_g1_test_sonic
    action_type: abs_qpos
    action_mode: abs
    sequential_step_sampling: false
    per_device_batch_size: 1
    load_all_data_for_training: true
    obs_image_size: [224, 224]
    delete_pause_frame: false
    video_backend: torchvision_av

trainer:
  max_train_steps: 1000
  num_warmup_steps: 50
  save_interval: 200
  eval_interval: 500
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 4
  gradient_checkpointing: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
