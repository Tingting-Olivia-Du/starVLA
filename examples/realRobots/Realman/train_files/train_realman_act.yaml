# StarVLA ACT smoke-training recipe for Realman RM-75 (joints + gripper).
#
# Dataset:   substitute your own compatible LeRobot dataset
# Robot:     Realman RM-75 (7-DoF arm) + parallel gripper
# Cameras:   cam0_rgb, cam1_rgb
# Action:    8-D (7 joint deltas + 1 absolute gripper opening)
# State:     8-D (7 joint angles + 1 gripper opening)
# Framework: ACT (LeRobot ACTPolicy wrapper)

run_id: realman_act
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_realman
is_debug: false
version_id: "0.21"

framework:
  name: ACT
  # Must equal len(RealmanRM75DataConfig.action_indices).
  chunk_size: 50
  action_dim: 8
  state_dim: 8
  n_obs_steps: 1
  image_size: [224, 224]
  image_keys: [cam0_rgb, cam1_rgb]
  # ImageNet pretraining is recommended; use null only for from-scratch baselines or offline smoke tests.
  pretrained_backbone_weights: "ResNet18_Weights.IMAGENET1K_V1"

datasets:
  vlm_data:
    # Kept for structural parity with VLM recipes; train_starvla.py uses only vla_data.
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    include_state: true

    # Parent directory of the <your_dataset> directory registered in data_config.py.
    data_root_dir: /path/to/lerobot_datasets
    data_mix: realman_example

    # Apply deltas to the joint command only; the gripper target remains absolute.
    action_mode: "delta"
    action_mode_apply_keys: ["action.delta_joints"]
    action_mode_state_map:
      "action.delta_joints": "state.joints"

    # Used only when an example has no language annotation.
    default_prompt: "perform the requested manipulation task"
    CoT_prompt: "Your task is {instruction}. Identify the key objects and locate their bounding boxes in [x1,y1,x2,y2] format."
    per_device_batch_size: 8
    load_all_data_for_training: true
    obs_image_size: [224, 224]
    # torchvision_av is suitable for H.264 MP4 camera streams.
    video_backend: torchvision_av

trainer:
  # Smoke-test defaults; review the training schedule for your dataset before launch.
  max_train_steps: 5000
  num_warmup_steps: 200
  save_interval: 2500
  eval_interval: 1000
  learning_rate:
    base: 2.5e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ""
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 50
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
